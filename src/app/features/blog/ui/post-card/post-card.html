<a class="card" [routerLink]="['/blog', post().id]">
  <div class="card__accent" [style.background-color]="post().coverColor"></div>
  <div class="card__body">
    <div class="card__tags">
      @for (tag of post().tags; track tag) {
        <span class="card__tag">{{ tag }}</span>
      }
    </div>
    <h2 class="card__title">{{ post().title }}</h2>
    <p class="card__excerpt">{{ post().excerpt }}</p>
    <div class="card__meta">
      <span class="card__author">{{ post().author }}</span>
      <span class="card__dot">·</span>
      <span class="card__date">{{ post().publishedAt | date: 'MMM d, yyyy' }}</span>
      <span class="card__dot">·</span>
      <span class="card__read-time">{{ post().readTime }} min read</span>
    </div>
  </div>
</a>
